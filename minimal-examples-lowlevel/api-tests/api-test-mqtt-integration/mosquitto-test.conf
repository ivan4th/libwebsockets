# Mosquitto configuration for MQTT integration tests
#
# Usage:
#   mosquitto -c mosquitto-test.conf -p 31883
#
# Or to run in background:
#   mosquitto -c mosquitto-test.conf -p 31883 -d

# Listen on test port
listener 31883

# Allow anonymous connections for testing
allow_anonymous true

# Disable persistence for testing
persistence false

# Logging
log_type error
log_type warning

# Optional: log connections for debugging
# log_type notice
# log_type information

# Max message size (128KB for large message tests)
message_size_limit 131072

# Max connections
max_connections 100

# No TLS for basic integration tests
# For TLS testing, add:
# listener 31884
# cafile /path/to/ca.crt
# certfile /path/to/server.crt
# keyfile /path/to/server.key
